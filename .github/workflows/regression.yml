name: Regression

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: Auth-middleware + secret scan
        run: node scripts/security-check.mjs
      - name: npm audit (high+)
        run: bun pm audit --audit-level high || true
        # `|| true` because Bun's audit may exit non-zero on transitive
        # advisories that have no fix available; the security-check script
        # is the hard gate for project-owned issues.
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: Docs consistency (pre-publish)
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      # PRD lives outside the repo (/mnt/documents). Skip PRD-specific checks
      # in CI by unsetting the docs dir; version.ts/README/CHANGELOG/glossary
      # are still validated and that's what we want to gate PRs on.
      - name: Pre-publish checklist (repo-only)
        run: bun run pre-publish
        env:
          SKIP_PRD_CHECK: "1"

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bun run test:unit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: Install browsers
        run: bunx playwright install --with-deps chromium
      - name: Build
        run: bun run build
      - name: Run Playwright (auto-starts preview)
        run: bun run test:e2e
        env:
          CI: "1"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
