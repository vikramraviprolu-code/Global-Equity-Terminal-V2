name: Regression

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Daily security scan (06:00 UTC) catches newly-disclosed advisories
    # against unchanged dependencies.
    - cron: "0 6 * * *"

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required for SARIF upload to Code Scanning
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: Auth-middleware + secret scan (hard gate)
        run: node scripts/security-check.mjs
      - name: Dependency audit (high+ fails the build)
        run: bun pm scan
      - name: Gitleaks secret scan (SARIF)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks
      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy.sarif
      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy
      - name: Trivy filesystem scan (hard gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

  docs:
    name: Docs consistency (pre-publish)
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      # PRD lives outside the repo (/mnt/documents). Skip PRD-specific checks
      # in CI by unsetting the docs dir; version.ts/README/CHANGELOG/glossary
      # are still validated and that's what we want to gate PRs on.
      - name: Pre-publish checklist (repo-only)
        run: bun run pre-publish
        env:
          SKIP_PRD_CHECK: "1"

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bun run test:unit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: Install browsers
        run: bunx playwright install --with-deps chromium
      - name: Build
        run: bun run build
      - name: Run Playwright (auto-starts preview)
        run: bun run test:e2e
        env:
          CI: "1"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
